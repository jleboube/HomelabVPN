version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: homelabvpn-postgres
    environment:
      POSTGRES_DB: homelabvpn
      POSTGRES_USER: homelabvpn
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/internal/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homelabvpn -d homelabvpn"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homelabvpn-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: homelabvpn-redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homelabvpn-network

  # Go Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homelabvpn-api
    environment:
      PORT: "8080"
      ENVIRONMENT: development
      DATABASE_URL: postgres://homelabvpn:devpassword@postgres:5432/homelabvpn?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production-min-32-chars
      ADMIN_JWT_SECRET: admin-jwt-secret-change-in-production-min-32-chars
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
      GOOGLE_REDIRECT_URL: http://localhost:3000/api/auth/google/callback
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_your-stripe-key}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_your-webhook-secret}
      FRONTEND_URL: http://localhost:3000
      ADMIN_FRONTEND_URL: http://localhost:3001
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homelabvpn-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homelabvpn-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-pk_test_your-stripe-key}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-google-client-id}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - homelabvpn-network

  # Admin Dashboard Frontend
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: homelabvpn-admin
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - homelabvpn-network

  # WireGuard VPN Server (for testing)
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: homelabvpn-wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
      SERVERURL: localhost
      SERVERPORT: 51820
      PEERS: 5
      PEERDNS: 1.1.1.1,1.0.0.1
      INTERNAL_SUBNET: 10.0.0.0
      ALLOWEDIPS: 0.0.0.0/0
    ports:
      - "51820:51820/udp"
    volumes:
      - wireguard_config:/config
      - /lib/modules:/lib/modules:ro
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    networks:
      - homelabvpn-network

volumes:
  postgres_data:
  redis_data:
  wireguard_config:

networks:
  homelabvpn-network:
    driver: bridge
