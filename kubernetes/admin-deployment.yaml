apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelabvpn-admin-web
  namespace: homelabvpn
  labels:
    app: homelabvpn
    component: admin-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homelabvpn
      component: admin-web
  template:
    metadata:
      labels:
        app: homelabvpn
        component: admin-web
    spec:
      serviceAccountName: homelabvpn-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: admin-web
          image: homelabvpn/admin:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: homelabvpn-config
                  key: API_URL
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: homelabvpn-admin-web
  namespace: homelabvpn
  labels:
    app: homelabvpn
    component: admin-web
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    app: homelabvpn
    component: admin-web

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: homelabvpn-admin-web-hpa
  namespace: homelabvpn
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: homelabvpn-admin-web
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 85
