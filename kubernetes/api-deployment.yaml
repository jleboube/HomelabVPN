apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelabvpn-api
  namespace: homelabvpn
  labels:
    app: homelabvpn-api
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homelabvpn-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: homelabvpn-api
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: homelabvpn-sa
      terminationGracePeriodSeconds: 30

      containers:
        - name: api
          image: homelabvpn/api:latest
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090

          env:
            - name: PORT
              value: "8080"
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: homelabvpn-config
                  key: ENVIRONMENT
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: homelabvpn-config
                  key: FRONTEND_URL
            - name: ADMIN_FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: homelabvpn-config
                  key: ADMIN_FRONTEND_URL
            - name: GOOGLE_REDIRECT_URL
              valueFrom:
                configMapKeyRef:
                  name: homelabvpn-config
                  key: GOOGLE_REDIRECT_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: homelabvpn-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: homelabvpn-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: homelabvpn-secrets
                  key: jwt-secret
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: homelabvpn-secrets
                  key: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: homelabvpn-secrets
                  key: google-client-secret
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: homelabvpn-secrets
                  key: stripe-secret-key
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: homelabvpn-secrets
                  key: stripe-webhook-secret
            - name: RELAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: homelabvpn-secrets
                  key: relay-api-key

          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - homelabvpn-api
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: homelabvpn-api-svc
  namespace: homelabvpn
  labels:
    app: homelabvpn-api
spec:
  type: ClusterIP
  selector:
    app: homelabvpn-api
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: metrics
      port: 9090
      targetPort: metrics

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: homelabvpn
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: homelabvpn-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
