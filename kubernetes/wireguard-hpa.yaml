apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wireguard-hpa
  namespace: homelabvpn
  labels:
    app: wireguard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wireguard-vpn
  minReplicas: 3
  maxReplicas: 50
  metrics:
    # Scale based on CPU utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Scale based on memory utilization
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

    # Scale based on custom metric: connected clients per pod
    # This requires Prometheus Adapter to be configured
    - type: Pods
      pods:
        metric:
          name: wireguard_connected_clients
        target:
          type: AverageValue
          averageValue: "100"

  behavior:
    # Scale up quickly when demand increases
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 5
          periodSeconds: 15
      selectPolicy: Max

    # Scale down slowly to avoid thrashing
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Min

---
# PodDisruptionBudget to ensure availability during scaling/updates
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: wireguard-pdb
  namespace: homelabvpn
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: wireguard
