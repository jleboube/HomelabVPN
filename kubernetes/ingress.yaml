apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homelabvpn-ingress
  namespace: homelabvpn
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://api.stripe.com; frame-src https://js.stripe.com https://hooks.stripe.com;" always;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - vpn.z-q.me
        - api.vpn.z-q.me
        - admin.vpn.z-q.me
      secretName: homelabvpn-tls
  rules:
    # Main website
    - host: vpn.z-q.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homelabvpn-web
                port:
                  number: 80

    # API subdomain
    - host: api.vpn.z-q.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homelabvpn-api-svc
                port:
                  number: 80

    # Admin dashboard subdomain
    - host: admin.vpn.z-q.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homelabvpn-admin-web
                port:
                  number: 80

---
# Network Policy for pod-to-pod communication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: homelabvpn-network-policy
  namespace: homelabvpn
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from nginx ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 80
    # Allow internal communication
    - from:
        - podSelector: {}
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow internal communication
    - to:
        - podSelector: {}
    # Allow external HTTPS (for OAuth, Stripe)
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80

---
# ClusterIssuer for Let's Encrypt
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: joeleboube@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
