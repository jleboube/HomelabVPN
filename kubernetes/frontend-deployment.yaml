apiVersion: apps/v1
kind: Deployment
metadata:
  name: homelabvpn-frontend
  namespace: homelabvpn
  labels:
    app: homelabvpn
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homelabvpn
      component: frontend
  template:
    metadata:
      labels:
        app: homelabvpn
        component: frontend
    spec:
      serviceAccountName: homelabvpn-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: frontend
          image: homelabvpn/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: homelabvpn-config
                  key: API_URL
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

---
apiVersion: v1
kind: Service
metadata:
  name: homelabvpn-frontend
  namespace: homelabvpn
  labels:
    app: homelabvpn
    component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: homelabvpn
    component: frontend
